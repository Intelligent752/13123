<html>
<head>
    <meta charset="UTF-8">
    <title>Таблица цветов</title>
    <style>
        table {
            border-collapse: collapse;
            width: 300px;
            font-family: sans-serif;
        }
        td {
            border: 1px solid #333;
            padding: 20px;
            text-align: center;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px black;
        }
        #color1 { background-color: #FFA500; }
        #color2 { background-color: #33FF57; } 
        #color3 { background-color: #0000FF; }
        #color4 { background-color: #FFC0CB; }
        #color5 { background-color: #FFFF00; }
    </style>
</head>
<body>

    <h2>Моя палитра</h2>
    <table>
        <tr><td id="color1">Оранжевый</td></tr>
        <tr><td id="color2">Ярко-зеленый</td></tr>
        <tr><td id="color3">Синий</td></tr>
        <tr><td id="color4">Розовый</td></tr>
        <tr><td id="color5">Жёлтый</td></tr>
    </table>

</body>
</html>
